<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>繁僕似錦</title>
    <style>
        body, button, input, select, .status-msg, .story-card, h1, h2 {
            font-family: "標楷體", "DFKai-SB", "BiauKai", serif;
        }
        body { background: #1a1a1a; color: #f0f0f0; display: flex; justify-content: center; padding: 20px; }
        .box { width: 100%; max-width: 750px; background: #2d2d2d; padding: 30px; border: 5px double #d4af37; border-radius: 15px; box-shadow: 0 0 30px rgba(0,0,0,0.7); position: relative; }
        h1 { color: #d4af37; text-align: center; margin-top: 0; letter-spacing: 5px; font-weight: bold; font-size: 2.2em; text-shadow: 0 0 10px rgba(212, 175, 55, 0.5); }
        h2 { color: #d4af37; text-align: center; margin-top: 0; letter-spacing: 3px; }
        .hidden { display: none; }
        .story-card { background: #3d3d3d; padding: 20px; border-radius: 8px; margin-bottom: 15px; border-left: 6px solid #8b0000; line-height: 1.8; font-size: 1.2em; }
        .option-list { font-size: 1.05em; margin-bottom: 15px; color: #e0e0e0; background: rgba(0,0,0,0.3); padding: 15px; border-radius: 5px; border: 1px solid #555; }
        #setup p { text-align: center; font-size: 1.2em; }
        #pName { padding: 8px; font-size: 1.1em; background: #444; color: white; border: 1px solid gold; border-radius: 5px; width: 60%; display: block; margin: 0 auto 20px; }

        .role-selection-area { display: flex; justify-content: space-around; margin: 20px 0; gap: 15px; }
        .role-card { flex: 1; border: 3px solid #555; border-radius: 10px; overflow: hidden; cursor: pointer; transition: 0.3s; background: rgba(0,0,0,0.2); text-align: center; }
        .role-card:hover { transform: translateY(-5px); border-color: #d4af37; box-shadow: 0 0 15px rgba(212, 175, 55, 0.5); }
        .role-card.selected { border-color: gold; box-shadow: 0 0 20px gold; background: rgba(139, 0, 0, 0.3); }

        .role-img-placeholder { width: 100%; height: 180px; display: flex; align-items: center; justify-content: center; background: #111; border-bottom: 1px solid #555; overflow: hidden; }
        .role-img-placeholder img { width: 100%; height: 100%; object-fit: cover; }

        .role-name { padding: 10px; color: gold; font-size: 1.3em; font-weight: bold; }
        .control-panel { display: flex; justify-content: space-around; margin: 20px 0; }
        button { background: #8b0000; color: gold; border: 1px solid gold; padding: 12px 25px; cursor: pointer; border-radius: 5px; font-weight: bold; font-size: 1.1em; transition: 0.3s; }
        button:hover { background: #600; transform: scale(1.05); box-shadow: 0 0 10px gold; }
        button:disabled { background: #555; border-color: #777; color: #999; cursor: not-allowed; }
        canvas { background: #fffaf0; display: block; margin: 0 auto; border-radius: 5px; border: 3px solid #8b4513; }
        .status-msg { text-align: center; color: #ffdf00; font-weight: bold; min-height: 60px; margin: 15px 0; padding: 10px; border: 1px dashed #d4af37; background: rgba(212, 175, 55, 0.1); font-size: 1.1em; }
        .result-text { white-space: pre-wrap; line-height: 2; color: #ffebcd; font-size: 1.25em; text-align: center; }
        .highlight-option { color: #fff; background: #8b0000; padding: 3px 8px; border-radius: 3px; font-weight: bold; }
    </style>
</head>
<body>

<div class="box">
    <h1>◈ 繁僕似錦 ◈</h1>

    <div id="setup">
        <p>請輸入閣下之名諱：</p>
        <input type="text" id="pName" placeholder="您的奴名">

        <p>請欽點閣下之出身：</p>
        <div class="role-selection-area">
            <div class="role-card" id="role_eunuch" onclick="selectRole('太監')">
                <div class="role-img-placeholder">
                    <img src="eunuch.jpg" alt="太監">
                </div>
                <div class="role-name">太監</div>
            </div>

            <div class="role-card" id="role_maid" onclick="selectRole('宮女')">
                <div class="role-img-placeholder">
                    <img src="maid.jpg" alt="宮女">
                </div>
                <div class="role-name">宮女</div>
            </div>

            <div class="role-card" id="role_nanny" onclick="selectRole('嬤嬤')">
                <div class="role-img-placeholder">
                    <img src="nanny.jpg" alt="嬤嬤">
                </div>
                <div class="role-name">嬤嬤</div>
            </div>
        </div>

        <div style="text-align: center; margin-top: 30px;">
            <button id="enterBtn" onclick="initGame()" disabled>進入紫禁城</button>
        </div>
    </div>

    <div id="game" class="hidden">
        <h2 id="stageTitle"></h2>
        <div class="story-card" id="storyContent"></div>
        <div class="option-list" id="optionDisplay"></div>
        <div class="status-msg" id="statusMsg">請選擇一個起點開始爬梯子</div>
        <canvas id="ladderCanvas" width="400" height="300"></canvas>
        <div class="control-panel" id="btnGroup">
            <button onclick="startLadder(0)">起點 1</button>
            <button onclick="startLadder(1)">起點 2</button>
            <button onclick="startLadder(2)">起點 3</button>
            <button onclick="startLadder(3)">起點 4</button>
        </div>
        <div id="nextStepArea" class="hidden" style="text-align: center; margin-top: 20px;">
            <button id="nextBtn" onclick="goToNext()" style="width: 200px; font-size: 1.2em;">下一步</button>
        </div>
    </div>

    <div id="ending" class="hidden">
        <h2 id="endHeader">最終宿命</h2>
        <div id="finalReport" class="result-text"></div>
        <button onclick="location.reload()" style="margin-top:20px; width:100%">再次輪迴</button>
    </div>
</div>

<script>
const scriptData = {
    "太監": {
        levels: [
            { t: "【甄會裝】", s: "剛入宮的莞常在稱病避寵，內務府總管派你前往送例行的藥材與物資。這是一個沒加薪又可能被皇上冷落的差事，你該如何表現？",
              o: ["A：【敷衍了事】 隨便放下東西就走，甚至冷言冷語。", "B：【雪中送炭】 恭敬遞上藥材，並自掏腰包添了銀炭。", "C：【暗中打探】 與小允子攀談，打聽小主是真的病了還是欲擒故縱。", "D：【投石問路】 刻意多放一包蜜餞，看小主是否回禮觀察禮數。"] },
            { t: "【蘭截】", s: "華妃要帶東阿阿膠進殿截胡正在與皇上談天的甄嬛，你守在殿外該如何應對？",
              o: ["A：【捨身擋駕】 故意攔住華妃，卑躬屈膝請娘娘稍候。", "B：【緩兵之計】 大聲向殿內通報，提醒甄嬛小主準備應對。", "C：【順水推舟】 側身讓開，沒必要為了碎玉軒得罪翊坤宮。", "D：【投其所好】 幫娘娘進去探探口風爭取緩衝。"] },
            { t: "【滴血驗親】", s: "你被皇后抓住與宮女對食的把柄，她要你在滴血驗親的水中盛裝白礬，你要如何應對？",
              o: ["A：【遵從后令】 趁機在水中彈入白礬。", "B：【偷樑換柱】 故意絆倒換上一盆溫水。", "C：【倒戈一擊】 通報皇上故意讓其發現破綻。", "D：【明哲保身】 假裝突發急症手抖，讓別人接手。"] }
        ],
        ends: { "BD": "您會迎來的結局:【一代驕奴．首領太監】\n你學會了「看破不說破」的道理。當甄嬛成為太后，你已是宮中最有體面的公公。", "A": "您會迎來的結局:【亂棍打死．權鬥棄子】\n你在主子面前表現得太過「忠誠」於對手，最終被選為平息怒火的犧牲品。", "C": "您會迎來的結局:【冷宮殘燈】\n你誰也不得罪，卻也誰也不提拔。新帝登基，你分到最荒涼冷宮老去。" }
    },
    "宮女": {
        levels: [
            { t: "【老祖宗保佑我】", s: "你入宮為宮女 決定去哪個宮服侍呢？", o: ["A：【翊坤宮】 雖然工作多、規矩大，但賞賜最豐厚，若能熬出頭，連內務府都要高看你一眼。", "B：【碎玉軒】 位置偏遠且主子稱病避寵，看似沒前途，但環境清幽，主子又是皇上的白月光純元周邊，待下人寬厚。", "C：【景仁宮】 宮中的權力中心，規矩最森嚴。在這裡做事必須滴水不漏，但也最容易接觸到後宮機密。", "D：【延禧宮】 主子寵愛平平且心思敏感。在這裡做事最考驗察言觀色，稍有不慎就會成為主子發洩的對象。"] },
            { t: "【是有點功夫在耳朵上的】", s: "你在長街提著燈籠趕路，無意中在轉角聽到兩位位份極高的小主正在密謀聯手對付另一位娘娘。這是一個足以讓後宮變天的秘密，但你不小心踩到了枯枝發出聲響，兩位小主的侍女立刻回頭張望，你不確定自己有沒有被發現。", o: ["A：【主動示忠】隔天立刻向你家小主稟報此事。既然聽到了，就必須讓這份情報成為你家小主爭寵或保命的籌碼。", "B：【守口如瓶】徹底忘記昨晚聽到的對話。宮裡死得最快的通常是知道太多的人，絕不跟任何人提起，包括你家小主。", "C：【借刀殺人】故意把這消息透漏給你討厭的另一個宮女，讓她去多嘴，若出事了也是她頂罪，若沒事你也能分一杯羹。", "D：【暗中示好】設法讓那兩位密謀的小主知道你「聽到了但絕不會說」，藉此向更強大的勢力投誠，為自己留一條後路。"] },
            { t: "【大清皮克敏】", s: "你負責分配內務府送來的绸緞或賞錢，卻發現送來的物資數目不對，顯然是被內務府的人剋扣了。若你照實上報，會得罪內務府太監；若你隱瞞，你家小主發現後會懷疑你中飽私囊。", o: ["A：【據實以告】寧可得罪太監，也要對主子忠誠。立刻向小主身邊的貼身姑姑回報，並請主子出面主持公道。", "B：【自行貼補】拿出自己存下的例銀把缺口補上。多一事不如少一事，保住眼前的平靜最重要，別讓主子覺得你辦事不力。", "C：【同流合污】找內務府太監私下談判，要求分一份「好處」，並說服小主這就是今年應得的份量，從此與太監結盟。", "D：【巧立名目】向小主解釋這批貨色雖少但質地最精，是內務府特意留下的「尖貨」，用語言藝術化解危機。"] }
        ],
        ends: { "A": "您會迎來的結局：【掌事姑姑】你成為小主最信任的左右手，掌握該宮所有宮女的生殺大權。雖然一生未嫁，但在宮中受盡尊重，晚年由小主保你出宮安養。", "CD": "您會迎來的結局：【內務府紅人】你在宮中混得風生起，跟各宮太監、宮女都有交情，是後宮最會做生意的宮女，財富驚人。", "B": "您會迎來的結局:【平安出宮】你在二十五歲那年平安獲准出宮。雖然在宮裡沒當上大官，但帶走了一身的好手藝與謹慎，回鄉開了間小鋪子，日子過得踏實。" }
    },
    "嬤嬤": {
        levels: [
            { t: "【選擇你的類故純】", s: "你被派往碎玉軒教導剛入宮的甄嬛小主，或前往延禧宮教導安陵容。這些新人的前途未卜，你想要以甚麼態度對待他們呢？", o: ["A：【嚴厲苛刻】拿出教習嬤嬤的威嚴，對細節極度挑剔，藉此收受小主家屬送來的賄賂才肯放寬標準。", "B：【溫和提點】看出甄嬛小主天資聰穎且氣度不凡，在教導禮儀時順便提點她皇上的喜好與後宮的生存之道，結下一段善緣。", "C：【公事公辦】不偏不倚，只教規矩不談情分。不管是誰得寵，你都能憑著這份「專業」在內務府立足。", "D：【暗中觀察】表面上教規矩，私下將小主的言行舉止紀錄下來，回報給提拔你的皇后或華妃，當個稱職的眼線。"] },
            { t: "【翠嘴打爛他的果】", s: "你在整理小主的膳食時，發現剛送來的某道甜點中似乎混入了對生育有害的食材（夾竹桃）。這顯然是高位妃嬪對小主的暗算。你會做出甚麼行動？", o: ["A：【立刻揭發】當眾指出膳食有問題，維護小主的胎氣或身體。這能贏得小主的絕對信任，但也直接得罪了背後的下毒者。", "B：【私下調包】悄悄將有問題的東西換掉，事後才在無人處提點小主防範。既救了小主，又沒讓衝突表面化，給自己留了餘地。", "C：【假裝不知】你只是一個嬤嬤，若是捲入其中，極可能被滅口，於是默默將餐具收走，不發一語。", "D：【反向利用】留下證據，但不告訴自家小主。等到合適的時機，將證據賣給敵對勢力，換取更高的職位或財富。"] },
            { t: "【年後跳曹】", s: "小主在鬥爭中失勢被發配冷宮，你身為貼身嬤嬤也必須跟隨。此時，勝利的一方派人找上你，承諾只要你在小主的餐點中加點「料」，就接你回內務府安享晚年。", o: ["A：【不離不棄】嚴詞拒絕，並發誓與小主共患難。若小主日後東山再起，你就是宮中最有威望的功臣長輩。", "B：【斷尾求生】接受條件。人老了總要為自己打算，小主已經倒台，沒必要陪著她死在冷宮裡。", "C：【巧施計謀】表面答應，但實際上讓小主「假死」脫身，或利用這個機會向皇上身邊的蘇培盛傳話求救。", "D：【自我犧牲】知道這是一個必死之局，你主動承擔所有罪名，換取小主一線生機。你的忠名將傳遍後宮，保全你宮外的家人。"] }
        ],
        ends: { "BC": "您會迎來的結局:【御前尚儀】你成為宮中資歷最深的嬤嬤，皇上甚至會委託你處理最機密的皇嗣教育。你就是規矩的化身。", "A": "您會迎來的結局:【榮歸故里】你平安待到退休年紀，帶著小主賞賜的大量金銀珠寶出宮。你在老家買地蓋房，成為受人尊敬的老祖宗，宮裡的鬥爭對你而言已如煙雲。", "D": "您會迎來的結局:【慎刑司見】在權力交替時，你因為知道太多或站錯隊伍，被當成犧牲品處置。" }
    }
};

let playerName = "", selectedRole = "", currentLvl = 0, results = [];
let ladderMatrix = [];
const cols = 4, rows = 12;
let canvas, ctx;

function selectRole(roleName) {
    selectedRole = roleName;
    document.querySelectorAll('.role-card').forEach(card => card.classList.remove('selected'));
    document.getElementById('role_' + (roleName === '太監' ? 'eunuch' : roleName === '宮女' ? 'maid' : 'nanny')).classList.add('selected');
    document.getElementById('enterBtn').disabled = false;
}

function initGame() {
    playerName = document.getElementById('pName').value || "小主";
    canvas = document.getElementById('ladderCanvas');
    ctx = canvas.getContext('2d');
    document.getElementById('setup').classList.add('hidden');
    document.getElementById('game').classList.remove('hidden');
    renderLevel();
}

function renderLevel() {
    const data = scriptData[selectedRole].levels[currentLvl];
    document.getElementById('stageTitle').innerText = playerName + "之" + data.t;
    document.getElementById('storyContent').innerText = data.s;
    document.getElementById('optionDisplay').innerHTML = data.o.map(o => "<div>" + o + "</div>").join('');
    document.getElementById('btnGroup').classList.remove('hidden');
    document.getElementById('nextStepArea').classList.add('hidden');
    document.getElementById('statusMsg').innerText = "點選起點，靜候天命...";

    ctx.shadowBlur = 0;
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    drawStaticLadder();
}

function drawStaticLadder() {
    ladderMatrix = Array.from({length: rows}, () => {
        let row = Array(cols-1).fill(0);
        for(let c = 0; c < cols-1; c++) {
            if (Math.random() > 0.6 && (c === 0 || row[c-1] === 0)) row[c] = 1;
        }
        return row;
    });

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.strokeStyle = "#8b4513";
    ctx.lineWidth = 2;
    const colW = 400/5;

    for(let i=1; i<=cols; i++) {
        ctx.beginPath(); ctx.moveTo(i*colW, 20); ctx.lineTo(i*colW, 280); ctx.stroke();
        ctx.fillStyle = "#8b4513";
        ctx.font = "bold 16px 標楷體";
        ctx.fillText(i, i*colW-5, 15);
        ctx.fillText(String.fromCharCode(64+i), i*colW-5, 295);
    }
    for(let r=0; r<rows; r++) {
        for(let c=0; c<cols-1; c++) {
            if(ladderMatrix[r][c] === 1) {
                ctx.beginPath(); ctx.moveTo((c+1)*colW, 40+r*20); ctx.lineTo((c+2)*colW, 40+r*20); ctx.stroke();
            }
        }
    }
}

function startLadder(startCol) {
    document.getElementById('btnGroup').classList.add('hidden');
    let curC = startCol, curR = 0;
    const colW = 400/5;

    const timer = setInterval(() => {
        if(curR < rows) {
            if(curC < cols-1 && ladderMatrix[curR][curC] === 1) {
                drawPath(curC, curR, curC+1, curR); curC++;
            } else if(curC > 0 && ladderMatrix[curR][curC-1] === 1) {
                drawPath(curC, curR, curC-1, curR); curC--;
            }
            drawPath(curC, curR, curC, curR+1); curR++;
        } else {
            clearInterval(timer);
            const picked = String.fromCharCode(65 + curC);
            results.push(picked);
            const fullOptionText = scriptData[selectedRole].levels[currentLvl].o[curC];
            document.getElementById('statusMsg').innerHTML = '天命已定：<span class="highlight-option">' + fullOptionText + '</span>';
            document.getElementById('nextStepArea').classList.remove('hidden');
        }
    }, 80);
}

function drawPath(x1, y1, x2, y2) {
    const colW = 400/5;
    ctx.save();
    ctx.strokeStyle = "#ff0000";
    ctx.lineWidth = 4;
    ctx.shadowBlur = 10;
    ctx.shadowColor = "gold";
    ctx.beginPath();
    ctx.moveTo((x1+1)*colW, 40+y1*20);
    ctx.lineTo((x2+1)*colW, 40+y2*20);
    ctx.stroke();
    ctx.restore();
}

function goToNext() {
    currentLvl++;
    if(currentLvl < 3) {
        renderLevel();
    } else {
        showEnding();
    }
}

function showEnding() {
    document.getElementById('game').classList.add('hidden');
    document.getElementById('ending').classList.remove('hidden');
    const counts = results.reduce((acc, val) => { acc[val] = (acc[val] || 0) + 1; return acc; }, {});
    const roleEnds = scriptData[selectedRole].ends;
    let finalMsg = "";
    if(selectedRole === "太監") {
        if((counts['B']||0) + (counts['D']||0) >= 2) finalMsg = roleEnds["BD"];
        else if((counts['A']||0) >= 2) finalMsg = roleEnds["A"];
        else finalMsg = roleEnds["C"];
    } else if(selectedRole === "宮女") {
        if((counts['A']||0) >= 2) finalMsg = roleEnds["A"];
        else if((counts['C']||0) + (counts['D']||0) >= 2) finalMsg = roleEnds["CD"];
        else finalMsg = roleEnds["B"];
    } else {
        if((counts['B']||0) + (counts['C']||0) >= 2) finalMsg = roleEnds["BC"];
        else if((counts['A']||0) >= 2) finalMsg = roleEnds["A"];
        else finalMsg = roleEnds["D"];
    }
    document.getElementById('finalReport').innerText = "軌跡：" + results.join(' ➔ ') + "\n\n" + finalMsg;
}
</script>
</body>
